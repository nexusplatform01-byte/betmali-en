kind = "web"
previewPath = "/"
title = "BETWIN Sports Betting"
version = "1.0.0"
id = "artifacts/betwin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19615

[services.development]
run = "pnpm --filter @workspace/betwin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/betwin", "run", "build" ]
publicDir = "artifacts/betwin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19615"
BASE_PATH = "/"
